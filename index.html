<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live News Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#12151c; --panel:#1b1f29; --ash:#3a3e47;
    --paper:#edeae2; --paper-dim:#c7c3b8;
    --amber:#e8a33d; --teal:#3f8f86; --brick:#b5462f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ink);color:var(--paper);font-family:'Inter',sans-serif;padding:0;}

  .section-head{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--ash);padding-bottom:14px;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
  .section-title{font-family:'Fraunces',serif;font-weight:900;font-size:22px;display:flex;align-items:center;gap:12px;}
  .live-badge{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--brick);border:1px solid var(--brick);padding:4px 10px;}
  .blink{width:6px;height:6px;border-radius:50%;background:var(--brick);animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--ash);color:var(--paper-dim);padding:6px 14px;cursor:pointer;transition:all .18s;}
  .tab.active{background:var(--brick);border-color:var(--brick);color:#fff;}
  .tab:hover:not(.active){border-color:var(--brick);color:#d97a5f;}
  .refresh-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--ash);color:var(--paper-dim);padding:6px 12px;cursor:pointer;transition:all .18s;}
  .refresh-btn:hover{border-color:var(--amber);color:var(--amber);}
  .refresh-btn:disabled{opacity:.4;cursor:not-allowed;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--ash);border:1px solid var(--ash);min-height:200px;}
  .card{background:var(--ink);padding:20px;display:flex;flex-direction:column;gap:10px;transition:background .2s;position:relative;}
  .card:hover{background:var(--panel);}
  .card-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border:1px solid;display:inline-block;width:fit-content;}
  .card h3{font-family:'Fraunces',serif;font-weight:700;font-size:15px;line-height:1.3;color:var(--paper);}
  .card p{color:var(--paper-dim);font-size:12px;line-height:1.55;flex-grow:1;}
  .card-meta{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-dim);border-top:1px solid var(--ash);padding-top:8px;margin-top:auto;}
  .skel{background:var(--panel);border-radius:2px;animation:shimmer 1.3s ease-in-out infinite;}
  @keyframes shimmer{0%,100%{opacity:.4;}50%{opacity:.8;}}
  .skel-card{background:var(--ink);padding:20px;display:flex;flex-direction:column;gap:10px;}
  .sk-tag{height:16px;width:55px;}.sk-t1{height:12px;width:92%;}.sk-t2{height:12px;width:70%;}.sk-b{height:10px;width:100%;}.sk-b2{height:10px;width:82%;}
  .error-state{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:10px;text-align:center;}
  .error-state p{color:var(--paper-dim);font-size:12px;max-width:30ch;line-height:1.6;}
  .last-updated{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-dim);margin-top:10px;text-align:right;}
  .last-updated span{color:var(--teal);}
  @media(max-width:600px){.grid{grid-template-columns:1fr 1fr;}}
  @media(max-width:400px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div style="padding:20px 0;">
  <div class="section-head">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div class="section-title">Assam &amp; India Live<span class="live-badge"><span class="blink"></span> Live Feed</span></div>
    </div>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-region="assam">Assam</button>
    <button class="tab" data-region="northeast">Northeast India</button>
    <button class="tab" data-region="india">India National</button>
  </div>
  <div class="grid" id="grid"></div>
  <p class="last-updated" id="lastUpdated"></p>
</div>

<script>
const CAT_COLORS={Politics:'#d97a5f',Floods:'#7c93c2',Economy:'#e8a33d',Culture:'#a884c9',Crime:'#b5462f',Development:'#3f8f86',Security:'#b5462f',Disaster:'#7c93c2',Sports:'#d97a5f',Science:'#5fb18c',Society:'#a884c9'};
const REGION_PROMPTS={
  assam:`Search the web for the 6 most recent news headlines from Assam, India as of today. Cover politics, floods, economy, development, culture, and crime. Return ONLY a JSON array of 6 objects with keys: title (max 10 words), excerpt (max 35 words, 2 sentences), category (one of: Politics, Floods, Economy, Culture, Crime, Development), timeAgo (e.g. "2h ago"), source (outlet name). Raw JSON only, no markdown fences.`,
  northeast:`Search the web for the 6 most recent news headlines from Northeast India (Assam, Meghalaya, Manipur, Nagaland, Arunachal Pradesh, Mizoram, Tripura, Sikkim) as of today. Return ONLY a JSON array of 6 objects with keys: title (max 10 words), excerpt (max 35 words), category (one of: Politics, Security, Economy, Culture, Disaster, Development), timeAgo, source, state. Raw JSON only, no markdown fences.`,
  india:`Search the web for the 6 most recent top national headlines from India as of today. Cover politics, economy, sports, science, and society. Return ONLY a JSON array of 6 objects with keys: title (max 10 words), excerpt (max 35 words), category (one of: Politics, Economy, Sports, Science, Society, Security), timeAgo, source. Raw JSON only, no markdown fences.`
};
let currentRegion='assam',lastFetched=null;
function skeletons(){return Array.from({length:6}).map(()=>`<div class="skel-card"><div class="skel sk-tag"></div><div class="skel sk-t1"></div><div class="skel sk-t2"></div><div class="skel sk-b"></div><div class="skel sk-b2"></div></div>`).join('');}
function renderCards(items){return items.map(item=>{const col=CAT_COLORS[item.category]||'#c7c3b8';const sub=item.state?` · ${item.state}`:'';return`<div class="card"><span class="card-tag" style="border-color:${col};color:${col}">${item.category}</span><h3>${item.title}</h3><p>${item.excerpt}</p><div class="card-meta"><span>${item.source}${sub}</span><span>${item.timeAgo}</span></div></div>`;}).join('');}
async function fetchNews(force=false){
  if(!force&&currentRegion===lastFetched)return;
  const grid=document.getElementById('grid'),btn=document.getElementById('refreshBtn'),upd=document.getElementById('lastUpdated');
  grid.innerHTML=skeletons();btn.disabled=true;btn.textContent='⟳ Loading…';upd.innerHTML='';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:REGION_PROMPTS[currentRegion]}]})});
    if(!res.ok)throw new Error(res.status);
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean=text.replace(/```json|```/gi,'').trim();
    const s=clean.indexOf('['),e=clean.lastIndexOf(']');
    if(s===-1)throw new Error('no json');
    const items=JSON.parse(clean.slice(s,e+1));
    if(!Array.isArray(items)||!items.length)throw new Error('empty');
    grid.innerHTML=renderCards(items);lastFetched=currentRegion;
    const t=new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    upd.innerHTML=`Last updated: <span>${t}</span>`;
  }catch(err){
    grid.innerHTML=`<div class="error-state"><div style="font-size:22px">⚡</div><h3 style="font-family:'Fraunces',serif;font-size:16px;color:#edeae2">Wire down</h3><p>Could not pull live headlines. Check connection or try refreshing.</p><button class="refresh-btn" onclick="fetchNews(true)" style="margin-top:6px">⟳ Try again</button></div>`;
  }finally{btn.disabled=false;btn.textContent='⟳ Refresh';}
}
document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');currentRegion=tab.dataset.region;lastFetched=null;fetchNews();});
document.getElementById('refreshBtn').addEventListener('click',()=>fetchNews(true));
fetchNews();
setInterval(()=>{lastFetched=null;fetchNews();},10*60*1000);
</script>
</body>
</html>
